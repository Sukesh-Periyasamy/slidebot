services:
  - type: web
    name: slidebot-api
    env: node
    plan: starter
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm turbo build --filter=@slidebot/api
    startCommand: pnpm --filter @slidebot/api start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: STORAGE_PROVIDER
        value: supabase
      - key: STORAGE_LOCAL_DIR
        value: ./uploads
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
