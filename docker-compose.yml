version: '3.9'

services:
  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL (local dev — mirrors Supabase schema)
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: slidebot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: slidebot
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Redis (local dev — mirrors Upstash for Socket.IO adapter + cache)
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: slidebot_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # SlideBot API Server
  # ─────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: slidebot_api
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/slidebot
      - REDIS_URL=redis://redis:6379
    env_file:
      - apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/api/node_modules
    command: pnpm dev

  # ─────────────────────────────────────────────────────────────────────────
  # SlideBot Web App (for production-like local testing)
  # ─────────────────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: slidebot_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - apps/web/.env
    depends_on:
      - api
    profiles:
      - full  # Only start with: docker compose --profile full up

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: slidebot_network
