name: Alpha Deployment CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies (pnpm)
        run: |
          corepack enable
          pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Run unit & integration tests
        run: pnpm test
      - name: Run Playwright E2E (preview only)
        run: |
          pnpm exec playwright install
          pnpm exec playwright test --project=chromium

  deploy-frontend:
    needs: lint-typecheck-test
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm i -g vercel
      - name: Deploy to Vercel (preview)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel --prod --token $VERCEL_TOKEN --confirm

  deploy-backend:
    needs: lint-typecheck-test
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Render (preview)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -X POST https://api.render.com/v1/services/<SERVICE_ID>/deploys \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"

  manual-smoke-test:
    needs: [deploy-frontend, deploy-backend]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Await manual approval for production rollout
        uses: peter-evans/slash-command-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          reaction-token: ${{ secrets.GITHUB_TOKEN }}
          command: approve
      - name: Run smoke test script
        run: |
          echo "Manual smoke test: verify homepage loads, login works, and basic slide navigation works."
          # Placeholder – testers should run these steps against the deployed URLs.

  production-deploy:
    needs: manual-smoke-test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Frontend to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel --prod --token $VERCEL_TOKEN --confirm
      - name: Deploy Backend to Render (production)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -X POST https://api.render.com/v1/services/<PROD_SERVICE_ID>/deploys \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"

  post-deploy-notify:
    needs: production-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Send deployment notification
        env:
          EMAIL_RECIPIENTS: ${{ secrets.DEPLOY_NOTIFY_EMAILS }}
        run: |
          echo "Alpha deployment completed. Notification sent to $EMAIL_RECIPIENTS."
          # Implement actual email sending via a service or CLI.
