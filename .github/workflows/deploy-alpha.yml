name: Deploy Alpha

on:
  workflow_dispatch:
    inputs:
      preview_url:
        description: 'Optional Vercel preview URL (auto‑generated if omitted)'
        required: false
        type: string

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm --version

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Deploy to Vercel (preview)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel --prebuilt --token $VERCEL_TOKEN --confirm

      - name: Export preview URL
        id: preview
        run: echo "preview_url=$(vercel --prebuilt --token $VERCEL_TOKEN --confirm --dry-run | tail -n1)" >> $GITHUB_OUTPUT

  deploy-backend:
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy backend to Render (preview)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -X POST https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"

  smoke-test:
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Simple health‑check for frontend
        env:
          URL: ${{ steps.preview.outputs.preview_url || 'https://preview-url-placeholder.vercel.app' }}
        run: |
          echo "Checking frontend health at $URL"
          curl -fsSL $URL || exit 1

      - name: Simple health‑check for backend
        env:
          BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          echo "Checking backend health at $BACKEND_URL"
          curl -fsSL $BACKEND_URL/health || exit 1

      - name: Report success
        run: echo "Alpha deployment succeeded and basic smoke checks passed."
